<!-- @dsCard group="Type" viewport="700x260" name="Display & Headlines" subtitle="Geist, tight tracking — 48 / 32 / 24px" -->
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--background); color: var(--on-surface); font-family: var(--font-sans); padding: 24px; }
  .spec { display:flex; align-items:baseline; gap:16px; padding:10px 0; border-bottom:1px solid var(--outline-variant); }
  .spec:last-child { border-bottom:none; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--outline); width:130px; flex-shrink:0; }
</style>
</head>
<body>
  <div class="spec"><span class="tag">headline-xl · 700</span><span class="text-headline-xl">Academic Overview</span></div>
  <div class="spec"><span class="tag">headline-lg · 600</span><span class="text-headline-lg">Mis Materias</span></div>
  <div class="spec"><span class="tag">headline-md · 600</span><span class="text-headline-md">Alumnos Atrasados</span></div>
</body>
</html>
