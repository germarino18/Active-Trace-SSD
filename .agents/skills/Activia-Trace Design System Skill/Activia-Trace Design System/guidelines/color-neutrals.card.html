<!-- @dsCard group="Colors" viewport="700x180" name="Neutral Surface Scale" subtitle="Zinc-based near-black surfaces — very subtle increments" -->
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--background); font-family: var(--font-sans); padding: 20px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; border-radius: var(--radius-md); border: 1px solid var(--outline-variant); overflow: hidden; }
  .chip { height: 64px; }
  .meta { padding: 8px; background: var(--surface-container); }
  .name { font-size: 11px; font-weight: 600; color: var(--on-surface); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--on-surface-variant); }
</style>
</head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#09090b"></div><div class="meta"><div class="name">background</div><div class="hex">#09090b</div></div></div>
  <div class="sw"><div class="chip" style="background:#0f0f12"></div><div class="meta"><div class="name">container-low</div><div class="hex">#0f0f12</div></div></div>
  <div class="sw"><div class="chip" style="background:#121215"></div><div class="meta"><div class="name">container</div><div class="hex">#121215</div></div></div>
  <div class="sw"><div class="chip" style="background:#18181b"></div><div class="meta"><div class="name">container-high</div><div class="hex">#18181b</div></div></div>
  <div class="sw"><div class="chip" style="background:#1e1e22"></div><div class="meta"><div class="name">container-highest</div><div class="hex">#1e1e22</div></div></div>
  <div class="sw"><div class="chip" style="background:#27272a"></div><div class="meta"><div class="name">outline-variant</div><div class="hex">#27272a</div></div></div>
  <div class="sw"><div class="chip" style="background:#52525b"></div><div class="meta"><div class="name">outline</div><div class="hex">#52525b</div></div></div>
</div>
</body>
</html>
