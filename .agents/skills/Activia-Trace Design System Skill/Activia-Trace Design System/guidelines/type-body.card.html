<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>

  .spec { display:flex; align-items:baseline; gap:16px; padding:9px 0; border-bottom:1px solid var(--outline-variant); }

</style>
</head>
