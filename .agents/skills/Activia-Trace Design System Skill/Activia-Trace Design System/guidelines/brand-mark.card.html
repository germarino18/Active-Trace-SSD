<!-- @dsCard group="Brand" viewport="700x200" name="Brand Mark" subtitle="Wordmark + violet glyph tile · Geist bold, tight tracking" -->
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--background); color: var(--on-surface); font-family: var(--font-sans); padding: 24px; display:flex; gap:40px; align-items:center; flex-wrap:wrap; }
  .lockup { display:flex; align-items:center; gap:12px; }
  .glyph { width:40px; height:40px; background:var(--primary); border-radius:var(--radius-md); display:flex; align-items:center; justify-content:center; color:var(--on-primary); }
  .glyph .material-symbols-outlined { font-size:24px; font-variation-settings:'FILL' 1; }
  .word { font-size:20px; font-weight:700; letter-spacing:-0.02em; }
  .sub { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--on-surface-variant); opacity:.7; }
  .onlight { background:#fafafa; padding:16px 20px; border-radius:var(--radius-lg); }
  .onlight .word { color:#09090b; }
  .onlight .sub { color:#52525b; }
</style>
</head>
<body>
  <div class="lockup">
    <div class="glyph"><span class="material-symbols-outlined">analytics</span></div>
    <div><div class="word">Activia-Trace</div><div class="sub">Academic Management</div></div>
  </div>
  <div class="lockup onlight">
    <div class="glyph"><span class="material-symbols-outlined">analytics</span></div>
    <div><div class="word">Activia-Trace</div><div class="sub">Academic Management</div></div>
  </div>
</body>
</html>
